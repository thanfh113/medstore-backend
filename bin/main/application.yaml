ktor:
  application:
    modules:
      - com.example.nhathuoc.ApplicationKt.module
  deployment:
    port: 8080
    host: 0.0.0.0

jwt:
  secret: "nhathuoc-super-secret-key-change-in-production"
  issuer: "nhathuoc-backend"
  audience: "nhathuoc-clients"
  access_token_expiry: 900000      # 15 minutes in ms
  refresh_token_expiry: 604800000  # 7 days in ms

database:
  url: "jdbc:mysql://localhost:3306/nhathuoc_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true"
  driver: "com.mysql.cj.jdbc.Driver"
  user: "root"
  password: "password"
  max_pool_size: 10
